<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">高級な家族ギフトのクリスタルブロック</title>
  <desc id="desc">深いブラウン、アイボリー、ゴールドを基調に、クリスタルブロックと家族写真を上品に配置したヒーロービジュアル。</desc>
  <defs>
    <linearGradient id="room" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#241913"/>
      <stop offset="0.48" stop-color="#6b5138"/>
      <stop offset="1" stop-color="#f4ead9"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset=".42" stop-color="#d8bf83" stop-opacity=".28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".52"/>
    </linearGradient>
    <radialGradient id="glow" cx="63%" cy="40%" r="45%">
      <stop offset="0" stop-color="#fff4cf" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#d8bf83" stop-opacity=".24"/>
      <stop offset="1" stop-color="#211914" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#211914" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1800" height="1100" fill="url(#room)"/>
  <rect width="1800" height="1100" fill="url(#glow)"/>
